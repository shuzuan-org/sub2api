# Prometheus 抓取配置 —— 稳定性验收看板数据源。
# 目标是源码开发栈里的后端容器（docker-compose.source.yml 起的 sub2api-backend-src）。
global:
  scrape_interval: 5s        # 验收期要看曲线即时变化，抓密一点
  evaluation_interval: 15s

scrape_configs:
  - job_name: sub2api-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["sub2api-backend-src:8080"]
        labels:
          service: sub2api
          env: local-dev

  # 生产环境(经 Caddy HTTPS 暴露 /metrics)。本地看板可直接对比本地 vs 生产曲线。
  - job_name: sub2api-prod
    scheme: https
    metrics_path: /metrics
    scrape_interval: 15s          # 生产抓稀一点，减轻线上压力
    tls_config:
      insecure_skip_verify: true  # 本地验收工具抓自家生产，容器内不带 CA 链，跳过校验即可
    static_configs:
      - targets: ["napi.origintask.cn"]
        labels:
          service: sub2api
          env: production

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
